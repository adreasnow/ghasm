name: Test GH Test Docker
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  test-valid:
    name: Test basic running
    runs-on: ubuntu-latest
    steps:
      - name: Validate inputs
        uses: adreasnow/ghasm/gh-test-docker@main
